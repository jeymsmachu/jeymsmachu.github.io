<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - jeymsmachu</title>

    <!-- fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yakuhanjp@3.4.1/dist/css/yakuhanjp.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="css/style.css">

    <script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>
</head>
<body>
    <!-- background -->
    <div class="background-grid"></div>

    <!-- logo at top -->
    <div class="page-logo">
        <a href="/">
            <h1>
                <img src="img/kv/logo.v2.png" alt="jeymsmachu">
            </h1>
        </a>
    </div>

    <!-- news list page -->
    <div class="news-page">
        <div class="news-page-inner">
            <!-- page title -->
            <div class="news-page-title">
                <h2><img src="img/title_news.png" alt="News"></h2>
            </div>

            <!-- simple news list (10 items) -->
            <ul class="news-list" id="news-list">
                <!-- js will fill this -->
            </ul>

            <!-- pagination -->
            <div class="pagination" id="pagination">
                <!-- js will fill this -->
            </div>
        </div>
    </div>

    <!-- menu button -->
    <div class="menu">
        <div class="menu-button js-menu-btn">
            <div class="menu-button-lines">
                <div class="menu-button-line"></div>
                <div class="menu-button-line"></div>
                <div class="menu-button-line"></div>
            </div>
            <div class="menu-button-text">
                <img src="img/menu/txt_menu_pc.png" alt="Menu">
            </div>
        </div>
    </div>

    <!-- menu panel -->
    <div class="menu-panel">
        <div class="menu-panel-inner">
            <ul class="menu-panel-list">
                <li class="menu-panel-item"><a href="/">Home</a></li>
                <li class="menu-panel-item"><a href="/news">Blog</a></li>
            </ul>
        </div>
    </div>

    <!-- loading screen -->
    <div class="loading-screen">
        <div class="loading-text">
            Loading<span>.</span><span>.</span><span>.</span>
        </div>
    </div>

    <!-- lenis smooth scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <!-- js -->
    <script src="js/script.js"></script>
    <script src="js/news.js"></script>
</body>
</html>
